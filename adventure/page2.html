<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Character Selection </title>
   
     <link rel="stylesheet" href="style.css">
</head>
<body>

    <section class="container">
    <form
        id="characterform"
        type="get"
        action="page3.html"
   >
   <h1><strong>Choose Your Character</strong></h1>
   <fieldset>
    <legend> Choose Your Character </legend>
     <div class="character">
                <input type="radio" id="a" name="character" value="warrior">
                <label for="a"><strong>Aria, the Warrior:</strong> Strong and brave, with the ability to overcome physical attacks.</label>
    </div>

    <div class="character">
        <input type="radio" id="e" name="character" value="mage">
        <label for="e"><strong>Eldrin, the Mage:</strong> Wise and knowledgeable, with the power to solve puzzles and cast spells. </label>
    </div>

    <div class="character">
            <input type="radio" id="t" name="character" value="rogue">
            <label for="t"><strong>Tara, the Rogue:</strong> Quick and cunning, with skills in stealth and persuasion. </label>
   </fieldset>
   <input type="submit" value="Continue">
   </form>
    </section>
</body>
</html>
