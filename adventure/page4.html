<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The First Obstacle</title>
   
  
     <link rel="stylesheet" href="style.css">

     <style>
    #submitbutton {
        background-color: red;
        color: white;
    }
</style>
</head>
<body>
    <section class="container">
     <h1>The First Obstacle</h1>
<p>As you venture deeper into the Dark Forest, you encounter a mystical guardian. The guardian blocks your path and poses a riddle:</p>
 <blockquote>"I speak without a mouth and hear without ears. I have no body, but I come alive with wind. <br>What am I?"</blockquote>
   <form action="page5.html" method="get">
      <label for="riddle">Your Answer:</label>
        <input 
                type="text" 
                id="riddle" 
                name="correctanswer" 
            >
        <input 
                type="submit" 
                id="submitbutton" 
                value="Submit Answer"
            >






   </form>
    </section>
    <script>
        
    
    const riddle = document.getElementById("riddle");
    const submitbutton = document.getElementById("submitbutton");

  
    function checkanswer(correctanswer, answerinput) {
        if (answerinput.value === correctanswer) {
            submitbutton.style.backgroundColor = "#8BC34A";
            submitbutton.style.color = "white";
        } else {
            submitbutton.style.backgroundColor = "red";
            submitbutton.style.color = "white";
        }
    }
    riddle.addEventListener("input", function() {
        checkanswer("echo", riddle);
    });
</script>

 
</body>
</html>
