<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Quest Begins</title>
   
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <section class="container">
        <h1>Pack Your Bag</h1>
        <p>Select the supplies you wish, think carefully, once you've chosen your gear, hit 'Continue', but beware! your actions have consequences!</p>

          <form method="get" action="page4.html">
             <div class="supplies">
                <input type="checkbox" id="food" name="supply" value="food">
                <label for="food">
                    <strong>Food:</strong> Essential for energy.
                </label>
            </div>

            <div class="supplies">
                <input type="checkbox" id="water" name="supply" value="water">
                <label for="water">
                    <strong>Water:</strong> Hydration is key!
                </label>
            </div>

            <div class="supplies">
                <input type="checkbox" id="potions" name="supply" value="potions">
                <label for="potions">
                    <strong>Magic Potions:</strong> For health and magical energy.
                </label>
            </div>

            <div class="supplies">
                <input type="checkbox" id="map" name="supply" value="map">
                <label for="map">
                    <strong>Maps:</strong> Don't get lost in the wilderness!
                </label>
            </div>

            <div class="supplies">
                <input type="checkbox" id="sword" name="supply" value="sword">
                <label for="sword">
                    <strong>Sword:</strong> Fend off those pesky foes!
                </label>
            </div>



                <input type="submit" value="Continue">

          </form>

    </section>
</body>
</html>
